services:
  # Web Application
  - type: web
    name: pixelrevive
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter  # $7/month - upgrade to standard for more RAM
    region: oregon
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pixelrevive-db
          property: connectionString

  # PostgreSQL Database
databases:
  - name: pixelrevive-db
    plan: free  # Free PostgreSQL (90-day trial on Render)
    region: oregon
    databaseName: pixelrevive
    user: pixelrevive_user
